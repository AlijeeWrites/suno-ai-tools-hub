<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suno Prompt Generator</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; background: #f8fafc; color: #1e293b; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { color: #6366f1; margin-bottom: 1rem; }
        .back { display: inline-block; color: #6366f1; text-decoration: none; margin-bottom: 1.5rem; }
        #tool-container { margin-top: 2rem; }
        .field-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        select, textarea, input[type="range"] {
            width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px;
            font-size: 1rem;
        }
        textarea { min-height: 100px; resize: vertical; }
        button {
            background: #6366f1; color: white; border: none; padding: 0.8rem 1.5rem;
            border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 0.5rem;
        }
        button:hover { background: #4f46e5; }
        #output-area { margin-top: 2rem; padding: 1.5rem; background: #f1f5f9; border-radius: 8px; }
        #generated-prompt { width: 100%; min-height: 120px; padding: 1rem; border: 1px solid #cbd5e1; border-radius: 8px; font-family: monospace; margin-bottom: 1rem; }
        .btn-copy { background: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back">← Back to Tools Hub</a>
        <h1>Suno Prompt Generator</h1>
        <p>Generate professional AI music prompts instantly.</p>

        <div id="tool-container">
            <!-- Engine will inject form here -->
            <p>Loading...</p>
        </div>

        <!-- Support CTA inside tool -->
        <div style="margin-top: 2rem; padding: 1.5rem; background: #fffbeb; border-left: 4px solid #f59e0b; color: #92400e;">
            ❤️ Love this free tool?  
            <a href="https://sevensky.gumroad.com/coffee" target="_blank" style="color:#b45309; font-weight:700;">Buy Me a Coffee</a> to keep it running.
        </div>
    </div>

    <script src="../js/engine.js"></script>

</html>
